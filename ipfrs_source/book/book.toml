[book]
title = "IPFRS Documentation"
authors = ["IPFRS Contributors"]
description = "Comprehensive documentation for IPFRS - InterPlanetary File & Reasoning System"
language = "en"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = true

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/ipfrs/ipfrs"
edit-url-template = "https://github.com/ipfrs/ipfrs/edit/main/book/{path}"
site-url = "/ipfrs/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.playground]
editable = true
copyable = true
line-numbers = true
runnable = false

[preprocessor.links]

[preprocessor.index]
